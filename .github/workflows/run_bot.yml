name: Run SCM Bot

on:
  schedule:
    # Jalankan setiap hari jam 06:00 WIB (Asia/Jakarta)
    # Cron format: menit jam hari bulan tahun (Waktu server UTC)
    - cron: '0 23 * * *' 
  
  workflow_dispatch: # Tombol untuk menjalankan manual kapan saja

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wajib agar bot bisa menulis/update file ke repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot Script
        env:
          EMAIL_SCM: ${{ secrets.EMAIL_SCM }}
          PASS_SCM: ${{ secrets.PASS_SCM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bot_scm.py
